version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Terraform Init
    dependencies: []
    task:
      env_vars:
        - name: TF_VAR_AWS_DEFAULT_REGION
          value: us-east-1
        - name: TF_VAR_AWS_ACCESS_KEY_ID
          value: $AWS_ACCESS_KEY_ID
        - name: TF_VAR_AWS_SECRET_ACCESS_KEY
          value: $AWS_SECRET_ACCESS_KEY
      jobs:
        - name: "\U0001F9EA Terraform Init"
          commands:
            - checkout
            - aws s3 ls
            - cd 1-terraform-apply
            - terraform init
            - artifact push workflow .terraform
            - artifact push workflow .terraform.lock.hcl
      secrets:
        - name: localstack
  - name: Terraform Deploy
    dependencies:
      - Terraform Init
    task:
      env_vars:
        - name: TF_VAR_AWS_DEFAULT_REGION
          value: us-east-1
        - name: TF_VAR_AWS_ACCESS_KEY_ID
          value: $AWS_ACCESS_KEY_ID
        - name: TF_VAR_AWS_SECRET_ACCESS_KEY
          value: $AWS_SECRET_ACCESS_KEY
      jobs:
        - name: Terraform Deploy
          commands:
            - checkout
            - cd 1-terraform-apply
            - artifact pull workflow .terraform
            - artifact pull workflow .terraform.lock.hcl
            - chmod -R +x .terraform/providers
            - terraform validate
            - terraform apply -auto-approve
            - artifact push workflow terraform.tfstate
      secrets:
        - name: localstack
  - name: Use S3 Bucket
    dependencies:
      - Terraform Deploy
    task:
      jobs:
        - name: Use S3 Bucket
          commands:
            - checkout
            - 'aws s3 cp README.md s3://group1-Aleksandar/'
            - 'aws s3 ls s3://group1-Aleksandar'
            - 'aws s3 rm s3://group1-Aleksandar/README.md'
      secrets:
        - name: localstack
  - name: Terraform Destroy
    dependencies:
      - Use S3 Bucket
    task:
      env_vars:
        - name: TF_VAR_AWS_DEFAULT_REGION
          value: us-east-1
        - name: TF_VAR_AWS_ACCESS_KEY_ID
          value: $AWS_ACCESS_KEY_ID
        - name: TF_VAR_AWS_SECRET_ACCESS_KEY
          value: $AWS_SECRET_ACCESS_KEY
      jobs:
        - name: Terraform Destroy
          commands:
            - checkout
            - cd 1-terraform-apply
            - artifact pull workflow .terraform
            - artifact pull workflow .terraform.lock.hcl
            - artifact pull workflow terraform.tfstate
            - chmod -R +x .terraform/providers
            - terraform destroy -auto-approve
      secrets:
        - name: localstack
