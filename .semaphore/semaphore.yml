version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F9EA Terraform Apply"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F9EA Terraform Apply"
          commands:
            - checkout
            - aws s3 ls
            - cd 1-terraform-apply
            - terraform init
            - artifact push workflow .terraform
            - terraform plan
            - terraform apply -auto-approve
      secrets:
        - name: localstack
  - name: Terraform Destroy
    dependencies:
      - "\U0001F9EA Terraform Apply"
    task:
      jobs:
        - name: Terraform Destroy
          commands:
            - checkout
            - cd 1-terraform-apply
            - artifact pull workflow .terraform
            - terraform destroy -auto-approve
      secrets:
        - name: localstack
